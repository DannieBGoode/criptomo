<script type="application/ld+json">
{
    "@context": "https://schema.org",
    "@type": "Blog",
    "keywords": "{{ site.keywords }}", 
    "url": "{{ site.url }}",
    "mainEntityOfPage": {
        "@type": "WebPage",
        "@id": "{{ site.url }}"
    },
    "author": {
        "@type": "Person",
        "name": "{{ site.author_name }}",
        "sameAs": [
            "https://twitter.com/{{ site.twitter_username }}",
            "https://github.com/{{ site.github_username }}"
        ]
    }
}
</script>
