<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BreadcrumbList",
  "itemListElement": [
    {
      "@type": "ListItem",
      "position": 1,
      "name": "{{ site.title }}",
      "item": "{{ site.url }}/"
    }{% if page.categories.size > 0 %},
    {% assign cat = page.categories | first %}
    {
      "@type": "ListItem",
      "position": 2,
      "name": "{{ cat | capitalize }}",
      "item": "{{ site.url }}/{{ cat }}/"
    },
    {
      "@type": "ListItem",
      "position": 3,
      "name": {{ page.title | jsonify }},
      "item": "{{ site.url }}{{ page.url }}"
    }
    {% else %},
    {
      "@type": "ListItem",
      "position": 2,
      "name": {{ page.title | jsonify }},
      "item": "{{ site.url }}{{ page.url }}"
    }
    {% endif %}
  ]
}
</script>
